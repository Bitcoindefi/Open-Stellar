name: Auto-assign on comment

on:
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  assign:
    # Ignore comments on pull requests; only act on issues
    if: ${{ !github.event.issue.pull_request }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = (context.payload.comment.body || '').trim().toLowerCase();
            const commenter = context.payload.comment.user.login;
            const issue = context.payload.issue;
            const { owner, repo } = context.repo;
            const issue_number = issue.number;

            const wantsAssign = /(^|\s)(\/assign|\/take|\.take)(\s|$)/.test(body)
              || body.includes('assign me') || body.includes('assign to me');
            const wantsUnassign = /(^|\s)(\/unassign|\/drop)(\s|$)/.test(body);

            if (wantsUnassign) {
              await github.rest.issues.removeAssignees({ owner, repo, issue_number, assignees: [commenter] });
              await github.rest.issues.createComment({ owner, repo, issue_number,
                body: `@${commenter} you have been unassigned. The issue is open again.` });
              return;
            }

            if (!wantsAssign) return;

            const current = (issue.assignees || []).map(a => a.login);
            if (current.length && !current.includes(commenter)) {
              await github.rest.issues.createComment({ owner, repo, issue_number,
                body: `@${commenter} this issue is already assigned to @${current[0]}. ` +
                      `Comment \`/unassign\` if you are the current assignee and want to drop it.` });
              return;
            }

            await github.rest.issues.addAssignees({ owner, repo, issue_number, assignees: [commenter] });
            await github.rest.issues.createComment({ owner, repo, issue_number,
              body: `@${commenter} you are now assigned to this issue. 🎯\n` +
                    `Please open a PR that references \`#${issue_number}\`. ` +
                    `If you become inactive, a maintainer may reassign it.` });
